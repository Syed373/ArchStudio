<div class="page-container">
  <div class="page-header meetings-header">
    <div><h1>Meetings</h1><p class="subtitle">{{meetings.length}} meetings</p></div>
    <button class="btn-primary" (click)="openModal()"><span class="material-symbols-outlined">add</span> Schedule Meeting</button>
  </div>

  <div class="meetings-list">
    <div class="meeting-card" *ngFor="let m of meetings">
      <div class="meeting-info">
        <div class="title-row">
          <h3 class="meeting-title">{{m.title}}</h3>
          <span class="badge badge-scheduled">{{m.status}}</span>
        </div>
        <p class="client-name">{{m.clientName}}</p>
        <div class="meeting-meta">
          <p><span class="material-symbols-outlined icon-sm">schedule</span> {{m.date}} at {{m.time}}</p>
          <p><span class="material-symbols-outlined icon-sm">location_on</span> {{m.location}}</p>
        </div>
        <p class="meeting-notes">"{{m.notes}}"</p>
      </div>
      <div class="meeting-actions">
        <button class="btn-outline">Complete</button>
        <button class="btn-text-danger">Cancel</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" *ngIf="isModalOpen">
    <div class="modal-content">
      <div class="modal-header"><h2>New Meeting</h2><button class="close-btn" (click)="closeModal()">&times;</button></div>
      <form (ngSubmit)="submitMeeting()">
        <div class="form-grid">
          <div class="form-group full-width"><label>Title *</label><input type="text" name="title" [(ngModel)]="newMeeting.title" class="form-control" required></div>
          <div class="form-group full-width">
            <label>Client *</label>
            <select name="clientName" [(ngModel)]="newMeeting.clientName" class="form-control" required>
              <option value="" disabled selected>Select client</option>
              <option *ngFor="let c of clients" [value]="c.name">{{c.name}}</option>
            </select>
          </div>
          <div class="form-group"><label>Date *</label><input type="date" name="date" [(ngModel)]="newMeeting.date" class="form-control" required></div>
          <div class="form-group"><label>Time</label><input type="time" name="time" [(ngModel)]="newMeeting.time" class="form-control"></div>
          <div class="form-group full-width"><label>Location</label><input type="text" name="location" [(ngModel)]="newMeeting.location" class="form-control"></div>
          <div class="form-group full-width"><label>Notes</label><textarea name="notes" [(ngModel)]="newMeeting.notes" class="form-control"></textarea></div>
        </div>
        <button type="submit" class="btn-submit">Schedule</button>
      </form>
    </div>
  </div>
</div>
